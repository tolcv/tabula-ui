# tabula-ui - Spring Boot Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=tabula-ui

# Logging Configuration
logging.level.root=INFO
logging.level.com.tabula=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Tabula Configuration
tabula.workspace.directory=${tabula.workspace.directory:}
tabula.disable.version-check=false
tabula.disable.notifications=false
tabula.thumbnail.generation.enabled=true
tabula.table-detection.enabled=true

# Thread Pool Configuration for Background Jobs
tabula.thread-pool.core-size=3
tabula.thread-pool.max-size=5
tabula.thread-pool.queue-capacity=100

# Jackson JSON Serialization
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# PDF Processing
tabula.pdf.max-pages=1000

# OCR Configuration (requires Tesseract to be installed: brew install tesseract)
# Leave empty to auto-detect from system PATH; set to tessdata directory path if needed
# e.g. tabula.ocr.tessdata.path=/usr/local/share/tessdata
tabula.ocr.tessdata.path=/opt/homebrew/Cellar/tesseract/5.5.2/share/tessdata
tabula.ocr.language=eng
# Higher DPI improves OCR quality on scanned tables (at cost of speed)
tabula.ocr.dpi=800
# Page segmentation mode: 6=single block, fallback to 4=columnar in code
tabula.ocr.psm=6
# OCR engine mode: 1=LSTM only (best for modern docs)
tabula.ocr.oem=1
tabula.ocr.preserve-interword-spaces=true
# Optional whitelist. Keep empty unless document has restricted characters.
tabula.ocr.char-whitelist=
# Native Tesseract library path (needed by JNA/Tess4J on macOS/Homebrew)
tabula.ocr.native-library-path=/opt/homebrew/lib
