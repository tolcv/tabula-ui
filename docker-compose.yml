version: '3.8'
services:
  tabula-ui:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Dfile.encoding=utf-8 -Xms256M -Xmx1024M"
      # Override workspace directory (default: OS application data dir)
      # tabula.workspace.directory: /data
    volumes:
      # Persist uploaded PDFs and workspace data across container restarts
      - tabula-ui_data:/root/.tabula
    restart: unless-stopped

volumes:
  tabula-ui_data:
